<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Itara — Mission Control</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'><polygon points='22,2 38,11 38,31 22,41 6,31 6,11' fill='%236C5CE7'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Cabinet+Grotesk:wght@900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dashboard.css">
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0C; }
  body { font-family: 'Space Grotesk', sans-serif; }

  .mc-loading {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: #0A0A0C;
    z-index: 9999;
  }
  .mc-loading-inner {
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }
  .mc-loading-logo {
    animation: mc-pulse 1.6s ease-in-out infinite;
  }
  @keyframes mc-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.96); }
  }
  .mc-loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.25em;
    color: rgba(244,242,236,0.5);
  }
  .mc-loading-bar {
    width: 200px; height: 2px;
    background: rgba(244,242,236,0.1);
    border-radius: 1px;
    overflow: hidden;
  }
  .mc-loading-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #6C5CE7, #FF6AC7);
    border-radius: 1px;
    animation: mc-bar 1.4s ease-in-out infinite;
  }
  @keyframes mc-bar {
    0% { width: 0%; margin-left: 0%; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }

  /* Variant switcher pill — top-right */
  .mc-switcher {
    position: fixed; top: 14px; right: 14px; z-index: 9999;
    display: none;
    gap: 4px; align-items: center;
    background: rgba(10,10,12,0.9);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(244,242,236,0.18);
    padding: 5px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .mc-switcher.visible { display: flex; }
  .mc-sw-label {
    font-size: 9px; letter-spacing: 0.18em;
    color: rgba(244,242,236,0.35);
    padding: 0 8px;
  }
  .mc-sw-btn {
    background: transparent; border: 0;
    color: rgba(244,242,236,0.5);
    padding: 6px 14px; border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    cursor: pointer; font-family: inherit;
    transition: all .15s;
  }
  .mc-sw-btn:hover { color: #F4F2EC; }
  .mc-sw-btn.active { background: #F4F2EC; color: #0A0A0C; }

  /* Auth gate overlay */
  .mc-auth-gate {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: #0A0A0C;
    z-index: 9998;
  }
  .mc-auth-card {
    background: #14151B;
    border: 1px solid rgba(244,242,236,0.12);
    border-radius: 20px;
    padding: 48px;
    text-align: center;
    max-width: 400px;
    width: 90%;
  }
  .mc-auth-card h2 {
    font-size: 24px; font-weight: 700;
    color: #F4F2EC;
    margin: 20px 0 12px;
  }
  .mc-auth-card p {
    font-size: 14px; color: rgba(244,242,236,0.55);
    margin: 0 0 28px; line-height: 1.5;
  }
  .mc-auth-btn {
    display: block; width: 100%;
    background: #F4F2EC; color: #0A0A0C;
    border: 0; border-radius: 12px;
    padding: 14px; font-size: 14px; font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer; transition: background .15s;
    text-decoration: none;
  }
  .mc-auth-btn:hover { background: #6C5CE7; color: #fff; }
</style>
</head>
<body>

<!-- Loading splash -->
<div id="mc-loading" class="mc-loading">
  <div class="mc-loading-inner">
    <svg class="mc-loading-logo" width="64" height="64" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lp" x1="2" y1="2" x2="42" y2="42" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#7C3AED"/>
          <stop offset="50%" stop-color="#4F46E5"/>
          <stop offset="100%" stop-color="#06B6D4"/>
        </linearGradient>
      </defs>
      <polygon points="22,2 38,11 38,31 22,41 6,31 6,11" fill="url(#lp)" opacity="0.95"/>
      <line x1="11" y1="17" x2="33" y2="17" stroke="#06B6D4" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="22" y1="11" x2="22" y2="31" stroke="#EC4899" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="11" y1="27" x2="33" y2="27" stroke="#4F46E5" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="22" cy="22" r="3.5" fill="#F9A8D4"/>
    </svg>
    <div class="mc-loading-text">BOOTING MISSION CONTROL</div>
    <div class="mc-loading-bar"><div class="mc-loading-bar-fill"></div></div>
  </div>
</div>

<!-- Auth gate (shown if not signed in) -->
<div id="mc-auth-gate" class="mc-auth-gate" style="display:none">
  <div class="mc-auth-card">
    <svg width="56" height="56" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ag" x1="2" y1="2" x2="42" y2="42" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#06B6D4"/>
        </linearGradient>
      </defs>
      <polygon points="22,2 38,11 38,31 22,41 6,31 6,11" fill="url(#ag)" opacity="0.9"/>
    </svg>
    <h2>Sign in to continue</h2>
    <p>Mission Control requires an Itara account. Sign in to access your dashboard.</p>
    <a href="index.html" class="mc-auth-btn">← Back to Itara</a>
  </div>
</div>

<!-- Variant switcher -->
<div class="mc-switcher" id="mc-switcher">
  <span class="mc-sw-label">VARIANT</span>
  <button class="mc-sw-btn" data-v="cockpit">A · COCKPIT</button>
  <button class="mc-sw-btn" data-v="command">B · COMMAND HUD</button>
</div>

<!-- React root -->
<div id="root"></div>

<!-- Libraries -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<!-- Data -->
<script src="data.js"></script>
<script src="dashboard-data.js"></script>

<!-- Shared hooks + Wordmark (Crystal Node) -->
<script type="text/babel" src="shared.jsx"></script>

<!-- Dashboard components -->
<script type="text/babel" src="dashboard.jsx"></script>

<!-- Boot -->
<script type="text/babel">
const SUPABASE_URL = 'https://pduogjyvgvpgxdzxdrqx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ahLDuaB1GT9wOxgg4ZCHng_lBQ9hc4L';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const MC_KEY = 'itara_mc_variant';

function DashApp({ user }) {
  const [variant, setVariant] = React.useState(() => {
    return localStorage.getItem(MC_KEY) || 'cockpit';
  });

  // Persist preference
  React.useEffect(() => {
    localStorage.setItem(MC_KEY, variant);
  }, [variant]);

  // Wire switcher buttons
  React.useEffect(() => {
    const sw = document.getElementById('mc-switcher');
    sw.classList.add('visible');
    sw.querySelectorAll('.mc-sw-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.v === variant);
      btn.onclick = () => setVariant(btn.dataset.v);
    });
  });

  // Patch ITARA_DASH with real user data if available
  React.useEffect(() => {
    if (user && window.ITARA_DASH) {
      const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'You';
      window.ITARA_DASH.USER.name = name.split(' ')[0];
      window.ITARA_DASH.USER.handle = '@' + (user.email?.split('@')[0] || 'user');
    }
  }, [user]);

  const Page = variant === 'command'
    ? window.D.CommandPage
    : window.D.CockpitPage;

  return <Page />;
}

async function boot() {
  // Wait for all deps
  if (!window.D || !window.ITARA_DASH || !window.ITARA_DATA || !window.Wordmark) {
    return setTimeout(boot, 60);
  }

  // Check auth
  const { data: { session } } = await sb.auth.getSession();

  const loading = document.getElementById('mc-loading');
  const authGate = document.getElementById('mc-auth-gate');

  if (!session) {
    // Show auth gate instead of dashboard
    loading.style.display = 'none';
    authGate.style.display = 'grid';
    return;
  }

  // Signed in — mount dashboard
  loading.style.display = 'none';
  ReactDOM.createRoot(document.getElementById('root')).render(
    React.createElement(DashApp, { user: session.user })
  );
}

setTimeout(boot, 300);
</script>

</body>
</html>
