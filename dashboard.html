  body.mc-light .dB-feed-row { background: #FFFFFF !important; }
  body.mc-light .dB-feed-g { color: #6C5CE7 !important; }
  body.mc-light .dB-feed-t { color: #0D0D14 !important; }
  body.mc-light .dB-feed-time { color: rgba(13,13,20,0.4) !important; }

  /* Auth gate overlay */
  .mc-auth-gate {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: #0A0A0C;
    z-index: 9998;
  }
  .mc-auth-card {
    background: #14151B;
    border: 1px solid rgba(244,242,236,0.12);
    border-radius: 20px;
    padding: 48px;
    text-align: center;
    max-width: 400px;
    width: 90%;
  }
  .mc-auth-card h2 {
    font-size: 24px; font-weight: 700;
    color: #F4F2EC;
    margin: 20px 0 12px;
  }
  .mc-auth-card p {
    font-size: 14px; color: rgba(244,242,236,0.55);

  }
  .mc-auth-btn {
    display: block; width: 100%;
    background: #F4F2EC; color: #0A0A0C;
    border: 0; border-radius: 12px;
    padding: 14px; font-size: 14px; font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer; transition: background .15s;
    text-decoration: none;
  }
  .mc-auth-btn:hover { background: #6C5CE7; color: #fff; }

<body>

<!-- Loading splash -->
<div id="mc-loading" class="mc-loading">
  <div class="mc-loading-inner">
    <svg class="mc-loading-logo" width="64" height="64" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lp" x1="2" y1="2" x2="42" y2="42" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#7C3AED"/>

<!-- Auth gate (shown if not signed in) -->

        <linearGradient id="ag" x1="2" y1="2" x2="42" y2="42" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#06B6D4"/>
        </linearGradient>
      </defs>
      <polygon points="22,2 38,11 38,31 22,41 6,31 6,11" fill="url(#ag)" opacity="0.9"/>
    </svg>
    <h2>Sign in to continue</h2>

<!-- React root -->
<div id="root"></div>

<!-- Libraries -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<!-- Data -->
<script src="data.js"></script>
<!-- Dashboard data (fresh user defaults) -->
<script src="dashboard-data.js"></script>

<!-- Shared hooks + Wordmark (Crystal Node) -->
<script type="text/babel" src="shared.jsx"></script>

<!-- Dashboard components -->
<script type="text/babel" src="dashboard.jsx"></script>

<!-- Boot -->
<script type="text/babel">
const SUPABASE_URL = 'https://pduogjyvgvpgxdzxdrqx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ahLDuaB1GT9wOxgg4ZCHng_lBQ9hc4L';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Expose to window for dashboard.jsx and other scripts
window.supa = sb;
window.sb = sb;

const MC_THEME_KEY = 'itara_mc_theme';

// ---- Auth state change listener ----
function setupAuthListener() {
  // Listen for auth state changes (sign in, sign out, token refresh)
  const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
    console.log('[Auth State]', event, session ? 'authenticated' : 'unauthenticated');

    if (event === 'SIGNED_OUT') {
      // User signed out, redirect to signin
      console.log('User signed out, redirecting...');
      window.location.href = '/index.html';
    } else if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
      // Session valid, allow dashboard to continue
      console.log('Session established or refreshed');
    }
  });

  return subscription;
}

// ---- Theme toggle logic (vanilla, outside React) ----
function initThemeToggle() {
  // Poll until React mounts the nav-embedded toggle
  const poll = setInterval(() => {
    const btn = document.getElementById('mc-theme-btn-nav');
    const label = document.getElementById('mc-theme-label');
    if (!btn || !label) return;
    clearInterval(poll);

    let isLight = localStorage.getItem(MC_THEME_KEY) === 'light';

    function applyTheme() {
      document.body.classList.toggle('mc-light', isLight);
      btn.classList.toggle('is-light', isLight);
      label.textContent = isLight ? 'LIGHT' : 'DARK';
      localStorage.setItem(MC_THEME_KEY, isLight ? 'light' : 'dark');
    }

    applyTheme();
    btn.onclick = () => { isLight = !isLight; applyTheme(); };
  }, 80);
}

// ---- Dashboard app — always Command HUD ----
function DashApp({ user }) {
  // Patch real user name from Supabase session
  React.useEffect(() => {
    if (user && window.ITARA_DASH) {
      const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'You';
      window.ITARA_DASH.USER.name = name.split(' ')[0];
      window.ITARA_DASH.USER.handle = '@' + (user.email?.split('@')[0] || 'user');
    }
  }, [user]);

  return <window.D.CommandPage />;
}

// ---- Session persistence check ----
let sessionCheckTimeout = null;

async function boot() {
  if (!window.D || !window.ITARA_DASH || !window.ITARA_DATA || !window.Wordmark) {
    return setTimeout(boot, 60);
  }

  const { data: { session } } = await sb.auth.getSession();
  const loading = document.getElementById('mc-loading');
  const authGate = document.getElementById('mc-auth-gate');

  if (!session) {
    loading.style.display = 'none';
    authGate.style.display = 'grid';
    return;
  }

  loading.style.display = 'none';
  setupAuthListener();
  initThemeToggle();
  ReactDOM.createRoot(document.getElementById('root')).render(
    React.createElement(DashApp, { user: session.user })
  );
}

// ---- Auto-restore session on page load ----
async function restoreSession() {
  // Give Supabase JS lib time to initialize
  await new Promise(resolve => setTimeout(resolve, 100));

  // Check if session exists
  const { data: { session } } = await sb.auth.getSession();

  if (session) {
    // Session found, boot dashboard
    boot();
  } else {
    // No session, check if we're still loading
    if (sessionCheckTimeout) clearTimeout(sessionCheckTimeout);

    // Retry up to 3 times with delay (in case Supabase is still initializing)
    let retries = 0;
    const retryCheck = async () => {
      retries++;
      await new Promise(resolve => setTimeout(resolve, 300));

      const { data: { session: retrySession } } = await sb.auth.getSession();
      if (retrySession) {
        boot();
      } else if (retries < 3) {
        retryCheck();
      } else {
        // No session found after retries, proceed with normal flow
        boot();
      }
    };

    retryCheck();
  }
}

// Start restoration immediately
restoreSession();
</script>

</body>
