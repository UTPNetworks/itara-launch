<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Itara — NeuralWork Hub</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'><polygon points='22,2 38,11 38,31 22,41 6,31 6,11' fill='%234A7BFF'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Cabinet+Grotesk:wght@900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOKENS
============================================================ */
:root {
  --ink: #0A0A0C; --ink-2: #14151A; --ink-3: #1C1C24;
  --bone: #F4F2EC; --bone-2: #E8E5DC;
  --line: rgba(244,242,236,0.12); --line-2: rgba(244,242,236,0.22);
  --mute: rgba(244,242,236,0.55); --mute-2: rgba(244,242,236,0.38);
  --blue: #4A7BFF; --blue-2: #7BA3FF;
  --violet: #6C5CE7; --pink: #FF6AC7; --yellow: #FFD84D;
  --green: #4ADE80; --red: #FF5C5C;
}
html, body { margin: 0; padding: 0; background: #0A0A0C; }
body { font-family: 'Space Grotesk', sans-serif; color: #F4F2EC; }

/* ============================================================
   ITARA TOP NAV
============================================================ */
.it-nav {
  position: sticky; top: 0; z-index: 400;
  background: rgba(10,10,12,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(244,242,236,0.10);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 56px; gap: 24px;
}
.it-nav-l { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.it-nav-sep { width: 1px; height: 18px; background: rgba(244,242,236,0.22); }
.it-nav-section {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
  color: rgba(244,242,236,0.45);
}
.it-nav-tabs {
  display: flex; gap: 2px;
  background: rgba(244,242,236,0.07);
  border: 1px solid rgba(244,242,236,0.12);
  border-radius: 10px; padding: 3px;
}
.it-nav-tab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
  padding: 6px 14px; border-radius: 7px;
  border: none; background: transparent;
  color: rgba(244,242,236,0.5);
  cursor: pointer; transition: background .15s, color .15s;
  text-decoration: none; display: inline-block;
}
.it-nav-tab:hover { color: #F4F2EC; background: rgba(244,242,236,0.1); }
.it-nav-tab.active { background: #F4F2EC; color: #0A0A0C; }
.it-nav-r { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.it-nav-tgl {
  display: flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  color: rgba(244,242,236,0.5); cursor: pointer; user-select: none; transition: color .2s;
}
.it-nav-tgl:hover { color: #F4F2EC; }
.it-tgl-track {
  width: 36px; height: 20px; border-radius: 999px;
  background: rgba(244,242,236,0.12); border: 1.5px solid rgba(244,242,236,0.2);
  position: relative; transition: background .22s, border-color .22s; flex-shrink: 0;
}
.it-nav-tgl.is-light .it-tgl-track { background: #4A7BFF; border-color: #4A7BFF; }
.it-tgl-thumb {
  position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px; border-radius: 50%;
  background: #F4F2EC; box-shadow: 0 1px 4px rgba(0,0,0,0.35);
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
.it-nav-tgl.is-light .it-tgl-thumb { transform: translateX(16px); }
.it-nav-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--blue); color: #fff;
  display: grid; place-items: center;
  font-weight: 700; font-size: 13px;
  border: 2px solid rgba(244,242,236,0.2); cursor: pointer;
}
.it-status-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: #4ADE80;
}
.it-status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4ADE80; box-shadow: 0 0 8px #4ADE80;
  animation: itPulse 1.6s ease-in-out infinite;
}
@keyframes itPulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:.55; transform:scale(0.85); }
}

/* ============================================================
   BOOT / AUTH
============================================================ */
.it-loading {
  position: fixed; inset: 0; display: grid; place-items: center;
  background: #0A0A0C; z-index: 9999;
}
.it-loading-inner { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.it-loading-logo { animation: itPulse 1.6s ease-in-out infinite; }
.it-loading-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.25em; color: rgba(244,242,236,0.45);
}
.it-loading-bar { width: 180px; height: 2px; background: rgba(244,242,236,0.1); border-radius: 1px; overflow: hidden; }
.it-loading-bar-fill {
  height: 100%; border-radius: 1px;
  background: linear-gradient(90deg, #4A7BFF, #7BA3FF);
  animation: itBar 1.4s ease-in-out infinite;
}
@keyframes itBar {
  0% { width:0%; margin-left:0%; }
  50% { width:60%; margin-left:20%; }
  100% { width:0%; margin-left:100%; }
}
.it-auth-gate { position: fixed; inset: 0; display: none; place-items: center; background: #0A0A0C; z-index: 9998; }
.it-auth-gate.show { display: grid; }
.it-auth-card {
  background: #14151B; border: 1px solid rgba(244,242,236,0.12);
  border-radius: 20px; padding: 48px; text-align: center; max-width: 400px; width: 90%;
}
.it-auth-card h2 { font-size: 24px; font-weight: 700; color: #F4F2EC; margin: 20px 0 12px; }
.it-auth-card p { font-size: 14px; color: rgba(244,242,236,0.55); margin: 0 0 28px; line-height: 1.5; }
.it-auth-btn {
  display: block; width: 100%; background: #F4F2EC; color: #0A0A0C;
  border: 0; border-radius: 12px; padding: 14px;
  font-size: 14px; font-weight: 700; font-family: 'Space Grotesk', sans-serif;
  cursor: pointer; transition: background .15s; text-decoration: none;
}
.it-auth-btn:hover { background: #4A7BFF; color: #fff; }
#it-shell { display: none; }
#it-shell.show { display: block; }

/* ============================================================
   LIGHT MODE
============================================================ */
body.mkt-light { background: #FAFAF7; color: #0A0A0C; }
body.mkt-light .it-nav { background: rgba(250,248,242,0.92); border-bottom-color: rgba(13,13,20,0.10); }
body.mkt-light .it-nav-section { color: rgba(13,13,20,0.45); }
body.mkt-light .it-nav-tabs { background: rgba(13,13,20,0.06); border-color: rgba(13,13,20,0.12); }
body.mkt-light .it-nav-tab { color: rgba(13,13,20,0.5); }
body.mkt-light .it-nav-tab:hover { color: #0D0D14; background: rgba(13,13,20,0.1); }
body.mkt-light .it-nav-tab.active { background: #0D0D14; color: #F4F2EC; }
body.mkt-light .it-nav-tgl { color: rgba(13,13,20,0.5); }
body.mkt-light .it-nav-tgl:hover { color: #0D0D14; }
body.mkt-light .it-tgl-track { background: rgba(13,13,20,0.1); border-color: rgba(13,13,20,0.2); }
body.mkt-light .it-nav-tgl.is-light .it-tgl-track { background: #4A7BFF; border-color: #4A7BFF; }
body.mkt-light .it-tgl-thumb { background: #0D0D14; }
body.mkt-light .it-nav-tgl.is-light .it-tgl-thumb { background: #fff; }
body.mkt-light .it-status-badge { color: #16A34A; }
body.mkt-light .it-status-dot { background: #16A34A; box-shadow: 0 0 8px #16A34A; }
body.mkt-light .nw-root { --ink:#FAFAF7; --ink-2:#FFFFFF; --ink-3:#F0EEE6; --bone:#0A0A0C; --bone-2:#1C1C24; --line:rgba(10,10,12,0.10); --line-2:rgba(10,10,12,0.18); --mute:rgba(10,10,12,0.55); --mute-2:rgba(10,10,12,0.35); }
body.mkt-light .nw-hero { background: linear-gradient(135deg, rgba(74,123,255,0.10), rgba(123,163,255,0.10)) !important; }
body.mkt-light .nw-card { background: #fff !important; border-color: rgba(10,10,12,0.10) !important; }
body.mkt-light .nw-panel { background: #fff !important; border-color: rgba(10,10,12,0.10) !important; }
body.mkt-light .nw-task-card { background: #fff !important; border-color: rgba(10,10,12,0.10) !important; }
/* Hero text fixes for light mode */
body.mkt-light .nw-hero-eyebrow { color: #2B5ECC; }
body.mkt-light .nw-hero-h1 { color: #0A0A0C; }
body.mkt-light .nw-hero-h1 span { color: #2B5ECC; }
body.mkt-light .nw-hero-sub { color: rgba(10,10,12,0.65); }
body.mkt-light .nw-kpi-k { color: rgba(10,10,12,0.45); }
body.mkt-light .nw-kpi-v { color: #0A0A0C; }
body.mkt-light .nw-kpi-v.blu { color: #2B5ECC; }
body.mkt-light .nw-kpi-d { color: #16A34A; }
body.mkt-light .nw-section-k { color: rgba(10,10,12,0.4); }
body.mkt-light .nw-section-title { color: #0A0A0C; }
body.mkt-light .nw-task-title { color: #0A0A0C; }
body.mkt-light .nw-task-desc { color: rgba(10,10,12,0.55); }
body.mkt-light .nw-task-budget { color: #2B5ECC; }
body.mkt-light .nw-task-meta { color: rgba(10,10,12,0.35); }
body.mkt-light .nw-task-bid-count { color: rgba(10,10,12,0.45); }
body.mkt-light .nw-task-bid-count b { color: #2B5ECC; }
body.mkt-light .nw-talent-name { color: #0A0A0C; }
body.mkt-light .nw-talent-role { color: rgba(10,10,12,0.45); }
body.mkt-light .nw-talent-rate { color: #2B5ECC; }
body.mkt-light .nw-bid-name { color: #0A0A0C; }
body.mkt-light .nw-bid-msg { color: rgba(10,10,12,0.55); }
body.mkt-light .nw-bid-amount { color: #2B5ECC; }
body.mkt-light .nw-escrow-name { color: #0A0A0C; }
body.mkt-light .nw-escrow-sub { color: rgba(10,10,12,0.45); }
body.mkt-light .nw-escrow-amount { color: #2B5ECC; }
body.mkt-light .nw-progress-bg { background: rgba(10,10,12,0.08); }
body.mkt-light .nw-bid { background: rgba(10,10,12,0.03); border-color: rgba(10,10,12,0.08); }

/* ============================================================
   NEURALWORK PAGE STYLES
============================================================ */
.nw-root { min-height: 100vh; background: var(--ink, #0A0A0C); padding: 0 0 80px; }

/* Hero */
.nw-hero {
  background: linear-gradient(135deg, rgba(74,123,255,0.18), rgba(123,163,255,0.08));
  border-bottom: 1px solid rgba(74,123,255,0.25);
  padding: 28.8px 38.4px 25.6px; position: relative; overflow: hidden;
}
.nw-hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(74,123,255,0.20), transparent 60%);
  pointer-events: none;
}
.nw-hero-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.28em; color: #7BA3FF; margin-bottom: 10px;
}
.nw-hero-h1 {
  font-size: 36.8px; font-weight: 700; line-height: 1.05;
  letter-spacing: -0.03em; margin: 0 0 14px; color: #F4F2EC;
}
.nw-hero-h1 span { color: #4A7BFF; }
.nw-hero-sub {
  font-size: 12px; color: rgba(244,242,236,0.55);
  margin: 0 0 28px; max-width: 520px; line-height: 1.6;
}
.nw-hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.nw-btn-primary {
  background: #4A7BFF; color: #fff; border: none;
  padding: 12px 24px; border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
  cursor: pointer; transition: background .18s;
}
.nw-btn-primary:hover { background: #7BA3FF; }
.nw-btn-ghost {
  background: transparent; color: rgba(244,242,236,0.7);
  border: 1px solid rgba(244,242,236,0.22);
  padding: 12px 24px; border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
  cursor: pointer; transition: border-color .18s, color .18s;
}
.nw-btn-ghost:hover { border-color: #4A7BFF; color: #7BA3FF; }
.nw-hero-kpis { display: flex; gap: 32px; margin-top: 32px; }
.nw-hero-kpi { display: flex; flex-direction: column; gap: 4px; }
.nw-kpi-k {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.22em; color: rgba(244,242,236,0.4);
}
.nw-kpi-v { font-size: 26px; font-weight: 700; color: #F4F2EC; line-height: 1; }
.nw-kpi-v.blu { color: #4A7BFF; }
.nw-kpi-d { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #4ADE80; }

/* Body */
.nw-body { padding: 32px 48px; display: flex; flex-direction: column; gap: 28px; }
.nw-section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.nw-section-k {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.24em; color: rgba(244,242,236,0.4);
}
.nw-section-title { font-size: 18px; font-weight: 700; color: #F4F2EC; margin: 4px 0 0; }
.nw-section-cta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
  color: #4A7BFF; background: none; border: none; cursor: pointer;
}
.nw-section-cta:hover { color: #7BA3FF; }

/* Filter pills */
.nw-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.nw-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
  padding: 7px 14px; border-radius: 8px;
  background: rgba(244,242,236,0.06);
  border: 1px solid rgba(244,242,236,0.12);
  color: rgba(244,242,236,0.55); cursor: pointer; transition: all .15s;
}
.nw-pill:hover { border-color: #4A7BFF; color: #7BA3FF; }
.nw-pill.active { background: rgba(74,123,255,0.18); border-color: #4A7BFF; color: #7BA3FF; }

/* Task board */
.nw-task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.nw-task-card {
  background: var(--ink-2, #14151A);
  border: 1px solid rgba(244,242,236,0.10);
  border-radius: 14px; padding: 20px;
  transition: border-color .18s, transform .18s;
  cursor: pointer; position: relative;
}
.nw-task-card:hover { border-color: rgba(74,123,255,0.4); transform: translateY(-1px); }
.nw-task-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.nw-task-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 0.18em;
  padding: 3px 8px; border-radius: 5px; flex-shrink: 0;
}
.nw-task-tag.ai      { background: rgba(108,92,231,0.15); color: #8C7DFF; }
.nw-task-tag.ml      { background: rgba(74,123,255,0.15); color: #7BA3FF; }
.nw-task-tag.data    { background: rgba(255,216,77,0.15); color: #FFD84D; }
.nw-task-tag.infra   { background: rgba(74,222,128,0.15); color: #4ADE80; }
.nw-task-tag.design  { background: rgba(255,106,199,0.15); color: #FF6AC7; }
.nw-task-bid-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: rgba(244,242,236,0.45);
}
.nw-task-bid-count b { color: #4A7BFF; }
.nw-task-title { font-size: 14px; font-weight: 600; color: #F4F2EC; margin-bottom: 8px; line-height: 1.4; }
.nw-task-desc { font-size: 12px; color: rgba(244,242,236,0.5); line-height: 1.5; margin-bottom: 14px; }
.nw-task-foot { display: flex; align-items: center; justify-content: space-between; }
.nw-task-budget { font-size: 18px; font-weight: 700; color: #4A7BFF; }
.nw-task-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.14em; color: rgba(244,242,236,0.35);
}
.nw-task-urgency {
  position: absolute; top: 0; right: 0;
  background: #FF5C5C; color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; font-weight: 700; letter-spacing: 0.16em;
  padding: 3px 8px; border-radius: 0 14px 0 8px;
}

/* Two columns */
.nw-two { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.nw-panel {
  background: var(--ink-2, #14151A);
  border: 1px solid rgba(244,242,236,0.10);
  border-radius: 16px; padding: 24px;
}

/* Talent profiles */
.nw-talent {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0; border-bottom: 1px solid rgba(244,242,236,0.06);
}
.nw-talent:last-child { border-bottom: none; }
.nw-talent-avatar {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  display: grid; place-items: center;
  font-weight: 700; font-size: 15px; color: #0A0A0C;
}
.nw-talent-body { flex: 1; }
.nw-talent-name { font-size: 13px; font-weight: 600; color: #F4F2EC; }
.nw-talent-role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: rgba(244,242,236,0.45); margin-top: 2px;
}
.nw-talent-rate { font-size: 15px; font-weight: 700; color: #4A7BFF; }
.nw-talent-stars {
  font-size: 11px; color: #FFD84D; letter-spacing: 1px;
}
.nw-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; font-weight: 700; letter-spacing: 0.14em;
  padding: 2px 6px; border-radius: 4px;
  background: rgba(74,123,255,0.15); color: #7BA3FF; margin-left: 6px;
}

/* Escrow tracker */
.nw-escrow {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 0; border-bottom: 1px solid rgba(244,242,236,0.06);
}
.nw-escrow:last-child { border-bottom: none; }
.nw-escrow-icon {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: rgba(74,123,255,0.15); border: 1px solid rgba(74,123,255,0.3);
  display: grid; place-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #7BA3FF;
}
.nw-escrow-body { flex: 1; }
.nw-escrow-name { font-size: 13px; font-weight: 600; color: #F4F2EC; }
.nw-escrow-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: rgba(244,242,236,0.45); margin-top: 2px;
}
.nw-escrow-stage {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
  padding: 4px 8px; border-radius: 6px;
}
.nw-escrow-stage.funded    { background: rgba(74,222,128,0.12); color: #4ADE80; border: 1px solid rgba(74,222,128,0.25); }
.nw-escrow-stage.review    { background: rgba(255,216,77,0.12); color: #FFD84D; border: 1px solid rgba(255,216,77,0.25); }
.nw-escrow-stage.pending   { background: rgba(74,123,255,0.12); color: #7BA3FF; border: 1px solid rgba(74,123,255,0.25); }
.nw-escrow-amount { font-size: 16px; font-weight: 700; color: #4A7BFF; }

/* Bid cards */
.nw-bid {
  background: rgba(244,242,236,0.04);
  border: 1px solid rgba(244,242,236,0.08);
  border-radius: 10px; padding: 14px;
  margin-bottom: 10px; display: flex; gap: 12px; align-items: center;
}
.nw-bid-avatar {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: grid; place-items: center;
  font-weight: 700; font-size: 13px; color: #0A0A0C;
}
.nw-bid-body { flex: 1; }
.nw-bid-name { font-size: 13px; font-weight: 600; color: #F4F2EC; }
.nw-bid-msg { font-size: 12px; color: rgba(244,242,236,0.45); margin-top: 2px; line-height: 1.4; }
.nw-bid-amount { font-size: 16px; font-weight: 700; color: #4A7BFF; flex-shrink: 0; }
.nw-bid-actions { display: flex; gap: 6px; margin-top: 8px; }
.nw-bid-accept {
  background: rgba(74,222,128,0.12); color: #4ADE80;
  border: 1px solid rgba(74,222,128,0.3); border-radius: 6px;
  padding: 5px 12px; font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 0.14em; cursor: pointer;
}
.nw-bid-reject {
  background: rgba(255,92,92,0.08); color: rgba(255,92,92,0.7);

/* ── AnimatedNum ── */
function AnimNum({ value, fmt = n => n.toFixed(2) }) {
  const [v, setV] = useState(0);
  const ref = useRef(false);
  useEffect(() => {
    if (ref.current) { setV(value); return; }
    ref.current = true;
    const s = performance.now();
    const tick = t => {
      const prog = Math.min(1, (t - s) / 1200);
      const e = 1 - Math.pow(1 - prog, 3);
      setV(value * e);
      if (prog < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [value]);
  return <>{fmt(v)}</>;
}

function initTheme() {
  const tgl = document.getElementById('it-theme-tgl');
  const lbl = document.getElementById('it-tgl-label');
  let isLight = localStorage.getItem(THEME_KEY) === 'light';
  function apply() {
    document.body.classList.toggle('mkt-light', isLight);
    tgl.classList.toggle('is-light', isLight);
    lbl.textContent = isLight ? 'LIGHT' : 'DARK';
    localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
  }
  apply();
  tgl.onclick = () => { isLight = !isLight; apply(); };
}
function mountWordmark() {
  const el = document.getElementById('it-wordmark');
  if (!el || !window.Wordmark) return;
  ReactDOM.createRoot(el).render(React.createElement(window.Wordmark, { size: 20 }));
}
function mountPage(user) {
  const av = document.getElementById('it-avatar');
  if (av && user) {
    const name = user.user_metadata?.full_name || user.email || 'U';
    av.textContent = name[0].toUpperCase();
  }
  ReactDOM.createRoot(document.getElementById('root')).render(
    React.createElement(NeuralWorkPage, { user })
  );
}
async function boot() {
  if (!window.Wordmark) return setTimeout(boot, 80);
  const { data: { session } } = await sb.auth.getSession();
  document.getElementById('it-loading').style.display = 'none';
  if (!session) { document.getElementById('it-auth-gate').classList.add('show'); return; }
  document.getElementById('it-shell').classList.add('show');
  initTheme();
  mountWordmark();
  mountPage(session.user);
}
setTimeout(boot, 300);
